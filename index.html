<style>
  :root {
    --bg: #0D1117;
    --bg2: #161B22;
    --bg3: #21262D;
    --border: #30363D;
    --text: #E6EDF3;
    --text2: #8B949E;
    --green: #3FB950;
    --green-bg: rgba(63,185,80,.12);
    --yellow: #D29922;
    --yellow-bg: rgba(210,153,34,.12);
    --red: #F85149;
    --red-bg: rgba(248,81,73,.12);
    --blue: #58A6FF;
    --blue-bg: rgba(88,166,255,.12);
    --purple: #BC8CFF;
    --purple-bg: rgba(188,140,255,.12);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.5; min-height: 100vh; }

  /* HEADER */
  .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .header-title { display: flex; align-items: center; gap: 12px; }
  .header-logo { width: 32px; height: 32px; background: linear-gradient(135deg,#00B4D8,#2DD4BF); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .header h1 { font-size: 18px; font-weight: 700; color: var(--text); }
  .header-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .updated { font-size: 12px; color: var(--text2); }

  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; padding: 24px 32px; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
  .stat-value { font-size: 28px; font-weight: 700; line-height: 1; }
  .stat-label { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .stat-card.green .stat-value { color: var(--green); }
  .stat-card.yellow .stat-value { color: var(--yellow); }
  .stat-card.blue .stat-value { color: var(--blue); }
  .stat-card.default .stat-value { color: var(--text); }

  /* FILTERS */
  .filters { padding: 0 32px 16px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .filter-btn { background: var(--bg2); border: 1px solid var(--border); color: var(--text2); padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: all .15s; font-family: inherit; }
  .filter-btn:hover { border-color: var(--blue); color: var(--blue); }
  .filter-btn.active { background: var(--blue-bg); border-color: var(--blue); color: var(--blue); font-weight: 600; }
  .search-wrap { margin-left: auto; position: relative; }
  .search-wrap input { background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 6px 12px 6px 32px; border-radius: 8px; font-size: 13px; font-family: inherit; outline: none; width: 200px; transition: border-color .15s; }
  .search-wrap input:focus { border-color: var(--blue); }
  .search-wrap::before { content: '🔍'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 12px; pointer-events: none; }

  /* TABLE */
  .table-wrap { padding: 0 32px 32px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: var(--bg2); border: 1px solid var(--border); padding: 10px 14px; text-align: left; font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  tbody tr:hover { background: var(--bg2); }
  tbody tr.hidden { display: none; }
  td { padding: 10px 14px; border-left: 1px solid var(--border); border-right: 1px solid var(--border); vertical-align: middle; }
  td:first-child { border-left: 1px solid var(--border); }

  .product-name { font-weight: 600; color: var(--text); }
  .product-url { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .product-url a { color: var(--blue); text-decoration: none; }
  .product-url a:hover { text-decoration: underline; }

  /* BADGES */
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; white-space: nowrap; }
  .badge-kappa   { background: rgba(88,166,255,.15); color: #58A6FF; }
  .badge-omega   { background: rgba(63,185,80,.15); color: #3FB950; }
  .badge-sigma   { background: rgba(188,140,255,.15); color: #BC8CFF; }
  .badge-zeta    { background: rgba(255,123,63,.15); color: #FF7B3F; }

  /* STATUS CHIPS */
  .status { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; }
  .status-done    { background: var(--green-bg); color: var(--green); }
  .status-none    { background: var(--bg3); color: var(--text2); }
  .status-live       { background: var(--green-bg); color: var(--green); }
  .status-unverified { background: var(--yellow-bg); color: var(--yellow); }
  .status-no         { background: var(--red-bg); color: var(--red); }

  .version-tag { background: var(--blue-bg); color: var(--blue); padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
  .version-dash { color: var(--text2); font-size: 12px; }

  .lp-link { color: var(--blue); text-decoration: none; font-size: 12px; }
  .lp-link:hover { text-decoration: underline; }

  .empty-row td { text-align: center; padding: 40px; color: var(--text2); font-size: 14px; }

  @keyframes clp-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    .header, .stats, .filters, .table-wrap { padding-left: 16px; padding-right: 16px; }
    .header { flex-direction: column; align-items: flex-start; }
    .search-wrap { margin-left: 0; }
    .search-wrap input { width: 100%; }
  }
</style>
</head>

const UPDATED = "2025-05-21";

function catBadge(cat) {
  const map = { Kappa:'badge-kappa', Omega:'badge-omega', Sigma:'badge-sigma', Zeta:'badge-zeta' };
  return `<span class="badge ${map[cat]||''}">${cat}</span>`;
}

function statusChip(ok, labelOk, labelNo) {
  return ok
    ? `<span class="status status-done">✓ ${labelOk}</span>`
    : `<span class="status status-none">— ${labelNo}</span>`;
}

function liveChip(live, hasServer) {
  if (!hasServer) return `<span class="status status-no">✗ Brak pliku</span>`;
  if (live)       return `<span class="status status-live">✓ Działa</span>`;
  return `<span class="status status-unverified">? Nieweryfikowane</span>`;
}

function render(filter, search) {
  const tbody = document.getElementById('table-body');
  const q = (search||'').toLowerCase();
  let visible = 0, done = 0, onServer = 0;

  tbody.innerHTML = '';
  PRODUCTS.forEach(p => {
    const matchCat = filter === 'all' || p.cat === filter;
    const matchSearch = !q || p.name.toLowerCase().includes(q) || p.src.toLowerCase().includes(q);
    if (!matchCat || !matchSearch) return;

    visible++;
    if (p.v1) done++;
    if (p.server) onServer++;

    const lpUrl = `https://bestlife4me.net/hd/${p.cat.toLowerCase()}/${p.slug}/`;

    tbody.innerHTML += `
      <tr>
        <td style="color:var(--text2);font-size:12px">${p.id}</td>
        <td>
          <div class="product-name">${p.name}</div>
          <div class="product-url"><a href="${p.url}" target="_blank">↗ ${p.url.replace('https://bestlife4me.net','')}</a></div>
        </td>
        <td>${catBadge(p.cat)}</td>
        <td style="color:var(--text2);font-size:12px">${p.src}</td>
        <td>${p.v1 ? `<span class="status status-done">✓ v1.0</span>` : `<span class="status status-none">— Brak</span>`}</td>
        <td>${statusChip(p.server,'Na serwerze','Nie wgrano')}</td>
        <td>${liveChip(p.live, p.server)}</td>
        <td>${p.v1 ? `<a class="lp-link" href="${lpUrl}" target="_blank">Otwórz ↗</a>` : '<span style="color:var(--text2);font-size:12px">—</span>'}</td>
      </tr>`;
  });

  if (visible === 0) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="8">Brak produktów spełniających kryteria</td></tr>`;
  }

  document.getElementById('stat-total').textContent = visible;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-server').textContent = onServer;
  document.getElementById('stat-progress').textContent = visible > 0 ? Math.round(done/visible*100)+'%' : '0%';
}

// Live check
async function checkUrl(url) {
  try {
    const proxy = 'https://api.allorigins.win/get?url=' + encodeURIComponent(url);
    const res = await fetch(proxy, { signal: AbortSignal.timeout(12000) });
    const json = await res.json();
    const html = json.contents || '';
    const hits = (html.match(/clp-hero|simpli-checkout-form/g) || []).length;
    return hits >= 2 ? 'live' : hits === 1 ? 'partial' : 'dead';
  } catch(e) {
    return 'error';
  }
}

async function refreshLiveStatus() {
  const btn = document.getElementById('refresh-btn');
  const icon = document.getElementById('refresh-icon');
  const label = document.getElementById('refresh-label');
  btn.disabled = true;
  btn.style.opacity = '0.6';
  icon.style.display = 'inline-block';
  icon.style.animation = 'clp-spin 1s linear infinite';

  const toCheck = PRODUCTS.filter(p => p.server);
  let done = 0;
  label.textContent = `Sprawdzam 0/${toCheck.length}…`;

  await Promise.all(toCheck.map(async (p) => {
    const result = await checkUrl(p.url);
    if (result === 'live')    p.live = true;
    else if (result === 'dead' || result === 'partial') p.live = false;
    // 'error' — leave as-is
    done++;
    label.textContent = `Sprawdzam ${done}/${toCheck.length}…`;
  }));

  const now = new Date();
  const ts = now.toLocaleDateString('pl-PL') + ' ' + now.toLocaleTimeString('pl-PL', {hour:'2-digit',minute:'2-digit'});
  document.getElementById('updated-at').textContent = 'Sprawdzono: ' + ts;

  btn.disabled = false;
  btn.style.opacity = '1';
  icon.style.animation = '';
  label.textContent = 'Odśwież dane';

  render(activeFilter, document.getElementById('search').value);
}

// Init
document.getElementById('updated-at').textContent = 'Aktualizacja: ' + UPDATED;

let activeFilter = 'all';
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render(activeFilter, document.getElementById('search').value);
  });
});

document.getElementById('search').addEventListener('input', e => {
  render(activeFilter, e.target.value);
});

render('all', '');
